seed: 42

# Action-space clipping for ManagerBasedRLEnv, which otherwise exposes unbounded actions.
# Set to null to disable.
action_clip: 1.0

# Models are instantiated using skrl's model instantiator utility.
models:
  separate: True
  policy:
    class: GaussianMixin
    clip_actions: False
    clip_log_std: True
    min_log_std: -5.0
    max_log_std: 2.0
    initial_log_std: -2.0
    network:
      - name: net
        input: OBSERVATIONS
        layers: [512, 256, 128]
        activations: elu
    output: ACTIONS
  critic_1:
    class: DeterministicMixin
    clip_actions: False
    network:
      - name: net
        input: OBSERVATIONS_ACTIONS
        layers: [256, 256, 256]
        activations: relu
    output: ONE
  critic_2:
    class: DeterministicMixin
    clip_actions: False
    network:
      - name: net
        input: OBSERVATIONS_ACTIONS
        layers: [256, 256, 256]
        activations: relu
    output: ONE
  target_critic_1:
    class: DeterministicMixin
    clip_actions: False
    network:
      - name: net
        input: OBSERVATIONS_ACTIONS
        layers: [256, 256, 256]
        activations: relu
    output: ONE
  target_critic_2:
    class: DeterministicMixin
    clip_actions: False
    network:
      - name: net
        input: OBSERVATIONS_ACTIONS
        layers: [256, 256, 256]
        activations: relu
    output: ONE

memory:
  class: RandomMemory
  memory_size: 1000

agent:
  class: SAC
  gradient_steps: 16
  batch_size: 4096
  discount_factor: 0.99
  polyak: 0.005
  actor_learning_rate: 3.0e-4
  critic_learning_rate: 3.0e-4
  learning_rate_scheduler: null
  learning_rate_scheduler_kwargs: null
  state_preprocessor: RunningStandardScaler
  state_preprocessor_kwargs: null
  random_timesteps: 100
  learning_starts: 100
  grad_norm_clip: 1.0
  learn_entropy: True
  entropy_learning_rate: 1.0e-3
  initial_entropy_value: 0.006
  target_entropy: null
  rewards_shaper_scale: 1.0
  experiment:
    directory: "go2_flat_sac"
    experiment_name: ""
    write_interval: 100
    checkpoint_interval: 1000

trainer:
  class: SequentialTrainer
  timesteps: 4000
  environment_info: log
